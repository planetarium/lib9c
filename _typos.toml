[default]
extend-ignore-re = [
    "\\\"([a-zA-Z0-9][a-zA-Z0-9])+\\\"",  # for hexadecimal string values.
    "2nd"
]

[default.extend-identifiers]
fo = "fo"  # FungibleOrder

[default.extend-words]
ba = "ba"  # byte array
oce = "oce"  # OperationCanceledException
ist = "ist"  # ItemSubType
Equipments = "Equipments"  # FIXME: Equipment is noncount word but our team doesn't have the policy about it.
Hel = "Hel"  # Stage prefix of world 8
saphire = "saphire"  # legacy item name in MaterialItemSheet.csv
shemas = "shemas"  # legacy typo in Lib9c.sln.DotSettings (JetBrains namespace)
Valut = "Valut"  # legacy event dungeon name in CSV data
gae = "gae"  # Korean name "gae-ddong-i" in JS test fixture

[files]
extend-exclude = [
    ".Libplanet/*"
]
